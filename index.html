<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahariya Islam | Portfolio</title>
    <!-- Icons & Google Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00f3ff;
            --secondary: #ff0055;
            --accent: #7000ff;
            --bg-dark: #030308;
            --card-bg: rgba(15, 15, 30, 0.65);
            --card-border: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --text-sub: #a0a0c0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* 3D Particle Canvas Background */
        #bg3d {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        /* Ultra-Fast Loader Screen */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #020205;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s;
        }

        .loader-box {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .spinner {
            width: 90px;
            height: 90px;
            border: 3px solid transparent;
            border-top: 3px solid var(--primary);
            border-bottom: 3px solid var(--secondary);
            border-radius: 50%;
            animation: spin 1.2s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
        }

        .loader-text {
            margin-top: 25px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Floating Social Bar */
        .social-bar {
            position: fixed;
            right: 25px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 18px;
            z-index: 1000;
        }

        .social-btn {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            font-size: 1.3rem;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .social-btn:hover {
            transform: scale(1.15) translateX(-5px);
            color: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.4);
        }

        /* Layout Container */
        .container {
            max-width: 1140px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 60px 20px;
        }

        .profile-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            padding: 50px 40px;
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.1);
            max-width: 550px;
            width: 100%;
            transition: transform 0.5s ease, box-shadow 0.5s ease;
        }

        .profile-card:hover {
            box-shadow: 0 30px 70px rgba(0, 243, 255, 0.15), inset 0 1px 0 rgba(255,255,255,0.2);
        }

        .profile-img-box {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto 25px;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary);
            box-shadow: 0 0 35px rgba(0, 243, 255, 0.3);
        }

        .hero-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.3rem;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 30%, var(--primary) 70%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .hero-tagline {
            font-size: 1.2rem;
            color: var(--text-sub);
            min-height: 32px;
            font-weight: 600;
        }

        .typing-text {
            color: var(--primary);
            border-right: 2px solid var(--primary);
            padding-right: 5px;
            animation: blink 0.75s step-end infinite;
        }

        @keyframes blink {
            from, to { border-color: transparent }
            50% { border-color: var(--primary); }
        }

        /* Section Styling */
        .section-title {
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            font-size: 2.2rem;
            margin: 80px 0 40px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* Stats Section */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            padding: 30px;
            border-radius: 20px;
            transition: all 0.4s ease;
        }

        .stat-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 15px 35px rgba(0, 243, 255, 0.15);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .stat-percent {
            color: var(--primary);
            font-family: 'Orbitron', sans-serif;
        }

        .progress-bar {
            width: 100%;
            background: rgba(255,255,255,0.05);
            height: 10px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--primary), var(--secondary));
            border-radius: 10px;
            transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Travel Gallery Grid */
        .travel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 25px;
        }

        .place-card {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            height: 250px;
            border: 1px solid var(--card-border);
            transition: all 0.4s ease;
        }

        .place-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .place-card:hover {
            border-color: var(--primary);
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
        }

        .place-card:hover img {
            transform: scale(1.12);
        }

        .place-info {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(180deg, transparent, rgba(3, 3, 8, 0.95));
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
        }

        /* Message Form */
        .contact-section {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            padding: 45px;
            border-radius: 25px;
            margin: 80px 0;
            border: 1px solid var(--card-border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 16px 20px;
            background: rgba(5, 5, 12, 0.6);
            border: 1px solid var(--card-border);
            color: #fff;
            border-radius: 12px;
            outline: none;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
            background: rgba(5, 5, 12, 0.8);
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(255, 0, 85, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0, 243, 255, 0.4);
        }

        @media (max-width: 768px) {
            .hero-name { font-size: 1.8rem; }
            .social-bar { right: 10px; }
            .social-btn { width: 44px; height: 44px; font-size: 1.1rem; }
            .contact-section { padding: 25px; }
        }
    </style>
</head>
<body>

    <!-- 1. Screen Loader -->
    <div id="loader">
        <div class="loader-box">
            <div class="spinner"></div>
        </div>
        <div class="loader-text">SAHARIYA ISLAM</div>
    </div>

    <!-- 2. Background 3D Canvas -->
    <canvas id="bg3d"></canvas>

    <!-- 3. Floating Social Icons -->
    <div class="social-bar">
        <a href="https://facebook.com" target="_blank" class="social-btn"><i class="fab fa-facebook-f"></i></a>
        <a href="https://instagram.com" target="_blank" class="social-btn"><i class="fab fa-instagram"></i></a>
        <a href="https://wa.me/8801700000000" target="_blank" class="social-btn"><i class="fab fa-whatsapp"></i></a>
    </div>

    <!-- 4. Hero Section -->
    <section class="hero">
        <div class="profile-card">
            <div class="profile-img-box">
                <!-- আপডেটেড ছবি ফাইলনেম -->
                <img src="IMG_2272-1-01.jpeg" alt="Sahariya Islam" class="profile-img">
            </div>
            <!-- আপডেটেড নাম -->
            <h1 class="hero-name">Sahariya Islam</h1>
            <p class="hero-tagline"><span class="typing-text" id="typing-text"></span></p>
        </div>
    </section>

    <!-- 5. Main Content Container -->
    <div class="container">

        <!-- Progress Stats -->
        <h2 class="section-title">Overview & Skills</h2>
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-header">
                    <span>Academic Progress</span>
                    <span class="stat-percent">85%</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" style="width: 85%;"></div></div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <span>Bangladesh Travel (41/64)</span>
                    <span class="stat-percent">64%</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" style="width: 64%;"></div></div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <span>Freelance Work</span>
                    <span class="stat-percent">92%</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" style="width: 92%;"></div></div>
            </div>
        </div>

        <!-- Visited Highlights -->
        <h2 class="section-title">Explored Highlights</h2>
        <div class="travel-grid">
            <div class="place-card">
                <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e" alt="Cox's Bazar">
                <div class="place-info">Cox's Bazar</div>
            </div>
            <div class="place-card">
                <img src="https://images.unsplash.com/photo-1519681393784-d120267933ba" alt="Rangamati">
                <div class="place-info">Rangamati</div>
            </div>
            <div class="place-card">
                <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b" alt="Khagrachhari">
                <div class="place-info">Khagrachhari</div>
            </div>
            <div class="place-card">
                <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" alt="Sajek Valley">
                <div class="place-info">Sajek Valley</div>
            </div>
            <div class="place-card">
                <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05" alt="Sylhet">
                <div class="place-info">Sylhet</div>
            </div>
            <div class="place-card">
                <img src="https://images.unsplash.com/photo-1426604966848-d7adac402bff" alt="Bandarban">
                <div class="place-info">Bandarban</div>
            </div>
            <div class="place-card">
                <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470" alt="Chittagong">
                <div class="place-info">Chittagong</div>
            </div>
        </div>

        <!-- Contact Section -->
        <h2 class="section-title">Get In Touch</h2>
        <div class="contact-section">
            <form id="contactForm">
                <div class="form-group">
                    <input type="text" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <input type="email" placeholder="Your Email Address" required>
                </div>
                <div class="form-group">
                    <input type="tel" placeholder="Your WhatsApp / Phone Number" required>
                </div>
                <div class="form-group">
                    <textarea rows="5" placeholder="Write your message here..." required></textarea>
                </div>
                <button type="submit" class="btn-submit">Send Message</button>
            </form>
        </div>

    </div>

    <!-- JavaScript & 3D Interactive Setup -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // 1. Loader Logic
        function hideLoader() {
            const loader = document.getElementById('loader');
            if (loader) {
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
            }
        }
        window.addEventListener('load', () => setTimeout(hideLoader, 600));
        setTimeout(hideLoader, 1500);

        // 2. Typing Effect
        const roles = ["Student", "Freelancer", "Traveler"];
        let roleIndex = 0;
        let charIndex = 0;
        const typingElement = document.getElementById('typing-text');

        function typeText() {
            if (charIndex < roles[roleIndex].length) {
                typingElement.textContent += roles[roleIndex].charAt(charIndex);
                charIndex++;
                setTimeout(typeText, 100);
            } else {
                setTimeout(eraseText, 1800);
            }
        }

        function eraseText() {
            if (charIndex > 0) {
                typingElement.textContent = roles[roleIndex].substring(0, charIndex - 1);
                charIndex--;
                setTimeout(eraseText, 50);
            } else {
                roleIndex = (roleIndex + 1) % roles.length;
                setTimeout(typeText, 400);
            }
        }
        typeText();

        // 3. 3D Particle Background
        try {
            const canvas = document.getElementById('bg3d');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true });

            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            const particlesGeometry = new THREE.BufferGeometry();
            const particlesCount = 1200;
            const posArray = new Float32Array(particlesCount * 3);

            for(let i = 0; i < particlesCount * 3; i++) {
                posArray[i] = (Math.random() - 0.5) * 12;
            }

            particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

            const particlesMaterial = new THREE.PointsMaterial({
                size: 0.015,
                color: 0x00f3ff,
                transparent: true,
                opacity: 0.7
            });

            const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
            scene.add(particlesMesh);

            camera.position.z = 3;

            let mouseX = 0;
            let mouseY = 0;

            document.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX / window.innerWidth) - 0.5;
                mouseY = (e.clientY / window.innerHeight) - 0.5;
            });

            function animate() {
                requestAnimationFrame(animate);
                particlesMesh.rotation.y += 0.0008 + (mouseX * 0.015);
                particlesMesh.rotation.x += 0.0008 + (mouseY * 0.015);
                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        } catch(e) {
            console.log("3D active");
        }

        // 4. Contact Form
        document.getElementById('contactForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('ধন্যবাদ! আপনার বার্তাটি সফলভাবে পৌঁছাল।');
            e.target.reset();
        });
    </script>
</body>
</html>
