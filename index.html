<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Portfolio</title>
    <!-- Icons & Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00f3ff;
            --secondary: #ff0055;
            --bg-dark: #05050a;
            --card-bg: rgba(20, 20, 35, 0.7);
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text);
            overflow-x: hidden;
        }

        /* 3D Particle Background Canvas */
        #bg3d {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
        }

        /* Loader Screen */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #020205;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .spinner {
            width: 70px;
            height: 70px;
            border: 4px solid rgba(0, 243, 255, 0.1);
            border-top: 4px solid var(--primary);
            border-right: 4px solid var(--secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loader-text {
            margin-top: 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            color: var(--primary);
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--primary);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Floating Social Icons Bar */
        .social-bar {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 100;
        }

        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 243, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.3rem;
            text-decoration: none;
            transition: 0.3s;
        }

        .social-btn:hover {
            transform: scale(1.2);
            color: var(--primary);
            box-shadow: 0 0 20px var(--primary);
        }

        /* Container Layout */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
        }

        .profile-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 30px;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            max-width: 500px;
            width: 100%;
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary);
            box-shadow: 0 0 25px var(--primary);
            margin-bottom: 20px;
        }

        .hero-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .hero-tagline {
            font-size: 1.1rem;
            color: #ccc;
            min-height: 30px;
        }

        /* Sections Title */
        .section-title {
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            font-size: 2rem;
            margin: 60px 0 30px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Progress Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            transition: 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0, 243, 255, 0.2);
        }

        .progress-bar {
            width: 100%;
            background: #111;
            height: 12px;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 10px;
        }

        /* Travel Places Gallery Grid */
        .travel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .place-card {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            height: 220px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .place-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s ease;
        }

        .place-card:hover img {
            transform: scale(1.1);
        }

        .place-info {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            color: #fff;
        }

        /* Contact Section */
        .contact-section {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 20px;
            margin: 60px 0;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary);
        }

        .btn-submit {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: #fff;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-submit:hover {
            box-shadow: 0 0 25px var(--secondary);
        }
    </style>
</head>
<body>

    <!-- 1. Screen Loader -->
    <div id="loader">
        <div class="spinner"></div>
        <!-- নাম পরিবর্তন করে তোমার নাম লেখো -->
        <div class="loader-text">RIYAISLAM SHUVO</div>
    </div>

    <!-- 2. Interactive 3D Background Canvas -->
    <canvas id="bg3d"></canvas>

    <!-- 3. Floating Social Icons -->
    <div class="social-bar">
        <!-- তোমার সোশ্যাল মিডিয়ার লিংকগুলো বসাবে -->
        <a href="https://facebook.com" target="_blank" class="social-btn"><i class="fab fa-facebook-f"></i></a>
        <a href="https://instagram.com" target="_blank" class="social-btn"><i class="fab fa-instagram"></i></a>
        <a href="https://wa.me/8801700000000" target="_blank" class="social-btn"><i class="fab fa-whatsapp"></i></a>
    </div>

    <!-- 4. Hero Section -->
    <section class="hero">
        <div class="profile-card">
            <!-- তোমার ছবির লিংক বসাও -->
            <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb" alt="Profile Picture" class="profile-img">
            <!-- নাম বদলাও -->
            <h1 class="hero-name">Riyaislam Shuvo</h1>
            <p class="hero-tagline"><span id="typing-text"></span></p>
        </div>
    </section>

    <!-- 5. Main Content Container -->
    <div class="container">

        <!-- Progress Stats -->
        <h2 class="section-title">Overview & Skills</h2>
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Study</h3>
                <div class="progress-bar"><div class="progress-fill" style="width: 85%;"></div></div>
                <p style="margin-top: 10px;">Progress: 85%</p>
            </div>
            <div class="stat-card">
                <h3>Travel Bangladesh</h3>
                <div class="progress-bar"><div class="progress-fill" style="width: 64%;"></div></div>
                <p style="margin-top: 10px;">Visited: 41 / 64 Districts (64%)</p>
            </div>
            <div class="stat-card">
                <h3>Freelancing</h3>
                <div class="progress-bar"><div class="progress-fill" style="width: 90%;"></div></div>
                <p style="margin-top: 10px;">Client Satisfaction: 90%</p>
            </div>
        </div>

        <!-- Visited Travel Places Gallery -->
        <h2 class="section-title">Explored Highlights</h2>
        <div class="travel-grid">
            <div class="place-card">
                <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e" alt="Cox's Bazar">
                <div class="place-info">Cox's Bazar</div>
            </div>
            <div class="place-card">
                <img src="https://images.unsplash.com/photo-1519681393784-d120267933ba" alt="Rangamati">
                <div class="place-info">Rangamati</div>
            </div>
            <div class="place-card">
                <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b" alt="Khagrachhari">
                <div class="place-info">Khagrachhari</div>
            </div>
            <div class="place-card">
                <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" alt="Sajek Valley">
                <div class="place-info">Sajek Valley</div>
            </div>
            <div class="place-card">
                <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05" alt="Sylhet">
                <div class="place-info">Sylhet</div>
            </div>
            <div class="place-card">
                <img src="https://images.unsplash.com/photo-1426604966848-d7adac402bff" alt="Bandarban">
                <div class="place-info">Bandarban</div>
            </div>
            <div class="place-card">
                <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470" alt="Chittagong">
                <div class="place-info">Chittagong</div>
            </div>
        </div>

        <!-- Message Form -->
        <h2 class="section-title">Contact Me</h2>
        <div class="contact-section">
            <form id="contactForm">
                <div class="form-group">
                    <input type="text" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <input type="email" placeholder="Your Email Address" required>
                </div>
                <div class="form-group">
                    <input type="tel" placeholder="Your WhatsApp / Phone Number" required>
                </div>
                <div class="form-group">
                    <textarea rows="5" placeholder="Write your message here..." required></textarea>
                </div>
                <button type="submit" class="btn-submit">Send Message</button>
            </form>
        </div>

    </div>

    <!-- JavaScript & 3D Interactive Setup -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // 1. Loader Hide Logic (Fast & Reliable)
        function hideLoader() {
            const loader = document.getElementById('loader');
            if (loader) {
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
            }
        }
        window.addEventListener('load', () => setTimeout(hideLoader, 800));
        setTimeout(hideLoader, 1500); // Safety backup timer

        // 2. Typing Effect for Subtitle
        const roles = ["Student", "Freelancer", "Traveler"];
        let roleIndex = 0;
        let charIndex = 0;
        const typingElement = document.getElementById('typing-text');

        function typeText() {
            if (charIndex < roles[roleIndex].length) {
                typingElement.textContent += roles[roleIndex].charAt(charIndex);
                charIndex++;
                setTimeout(typeText, 100);
            } else {
                setTimeout(eraseText, 1500);
            }
        }

        function eraseText() {
            if (charIndex > 0) {
                typingElement.textContent = roles[roleIndex].substring(0, charIndex - 1);
                charIndex--;
                setTimeout(eraseText, 50);
            } else {
                roleIndex = (roleIndex + 1) % roles.length;
                setTimeout(typeText, 500);
            }
        }
        typeText();

        // 3. Three.js Background Particle Animation
        try {
            const canvas = document.getElementById('bg3d');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true });

            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            const particlesGeometry = new THREE.BufferGeometry();
            const particlesCount = 1000;
            const posArray = new Float32Array(particlesCount * 3);

            for(let i = 0; i < particlesCount * 3; i++) {
                posArray[i] = (Math.random() - 0.5) * 15;
            }

            particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

            const particlesMaterial = new THREE.PointsMaterial({
                size: 0.012,
                color: 0x00f3ff,
                transparent: true,
                opacity: 0.8
            });

            const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
            scene.add(particlesMesh);

            camera.position.z = 3;

            let mouseX = 0;
            let mouseY = 0;

            document.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX / window.innerWidth) - 0.5;
                mouseY = (e.clientY / window.innerHeight) - 0.5;
            });

            function animate() {
                requestAnimationFrame(animate);
                particlesMesh.rotation.y += 0.001 + (mouseX * 0.01);
                particlesMesh.rotation.x += 0.001 + (mouseY * 0.01);
                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        } catch(e) {
            console.log("3D canvas issue bypassed");
        }

        // 4. Contact Form Submit Event
        document.getElementById('contactForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('ধন্যবাদ! আপনার মেসেজটি পেয়েছি।');
            e.target.reset();
        });
    </script>
</body>
</html>
